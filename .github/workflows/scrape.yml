name: Skrap priser

on:
  schedule:
    # Hver 6. time (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: "0 */6 * * *"
  workflow_dispatch: # Lar meg kjøre manuelt fra GitHub UI hvis jeg trenger det

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Sett opp Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Installer avhengigheter
        run: pip install -r scrapers/requirements.txt

      - name: Kjør skrapere
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python scrapers/run_all.py
